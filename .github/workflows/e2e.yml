name: E2E Tests

on:
  workflow_call:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: matchhire_test
          POSTGRES_USER: matchhire
          POSTGRES_PASSWORD: matchhire
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run backend migrations
        run: |
          cd backend
          python manage.py migrate --settings=matchhire_backend.settings.test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: matchhire_test
          DB_USER: matchhire
          DB_PASSWORD: matchhire
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Create test data
        run: |
          cd backend
          python manage.py loaddata test_fixtures --settings=matchhire_backend.settings.test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: matchhire_test
          DB_USER: matchhire
          DB_PASSWORD: matchhire

      - name: Start backend server
        run: |
          cd backend
          python manage.py runserver 0.0.0.0:8000 --settings=matchhire_backend.settings.test &
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: matchhire_test
          DB_USER: matchhire
          DB_PASSWORD: matchhire
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Start frontend dev server
        run: |
          cd frontend
          npm run preview &
        env:
          VITE_API_URL: http://localhost:8000

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health/; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:4173/; do sleep 2; done'

      - name: Run Playwright tests
        run: |
          cd frontend
          npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 30

      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: frontend/trace.zip
          retention-days: 30

  e2e-candidate-workflow:
    name: Candidate Workflow E2E
