components:
  schemas:
    EmploymentType:
      enum:
      - full_time
      - part_time
      - contract
      - internship
      type: string
      description: |-
        * `full_time` - Full Time
        * `part_time` - Part Time
        * `contract` - Contract
        * `internship` - Internship
    ExperienceLevel:
      enum:
      - entry
      - junior
      - mid
      - senior
      - lead
      type: string
      description: |-
        * `entry` - Entry Level
        * `junior` - Junior
        * `mid` - Mid Level
        * `senior` - Senior
        * `lead` - Lead
    JobCreateRequest:
      type: object
      description: Serializer for creating a job (recruiter only)
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        company_name:
          type: string
          minLength: 1
          maxLength: 255
        location:
          type: string
          minLength: 1
          maxLength: 255
        employment_type:
          $ref: '#/components/schemas/EmploymentType'
        experience_level:
          $ref: '#/components/schemas/ExperienceLevel'
        description:
          type: string
          minLength: 1
        requirements:
          type: string
        responsibilities:
          type: string
        salary_min:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        salary_max:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        currency:
          type: string
          minLength: 1
          maxLength: 3
        is_remote:
          type: boolean
        status:
          $ref: '#/components/schemas/JobStatus'
      required:
      - company_name
      - description
      - location
      - title
    JobDetail:
      type: object
      description: Serializer for job detail view
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        recruiter_id:
          type: string
