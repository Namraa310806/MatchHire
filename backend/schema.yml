openapi: 3.0.3
info:
  title: MatchHire API
  version: v1
  description: Backend API for MatchHire recruitment platform.
paths:
  /api/admin/applications/:
    get:
      operationId: admin_applications_retrieve
      description: 'List all applications with filtering and pagination (read-only).
        Admin only. Filters: status, candidate_id, job_id, recruiter_id.'
      summary: List applications
      parameters:
      - in: query
        name: candidate_id
        schema:
          type: string
        description: Filter by candidate ID
      - in: query
        name: job_id
        schema:
          type: string
        description: Filter by job ID
      - in: query
        name: ordering
        schema:
          type: string
        description: Order by field
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Page size (max 200)
      - in: query
        name: recruiter_id
        schema:
          type: string
        description: Filter by recruiter ID
      - in: query
        name: status
        schema:
          type: string
        description: Filter by application status
      tags:
      - Admin
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Applications retrieved successfully with pagination.
        '400':
          description: Invalid filter parameters.
        '403':
          description: Admin access required.
  /api/admin/dashboard/:
    get:
      operationId: admin_dashboard_retrieve
      description: Get platform statistics with aggregated metrics. Admin only.
      summary: Admin dashboard
      tags:
      - Admin
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Platform statistics retrieved successfully.
        '403':
          description: Admin access required.
  /api/admin/jobs/:
    get:
      operationId: admin_jobs_retrieve
      description: 'List all jobs with filtering and pagination. Admin only. Returns
        ALL jobs (draft, active, closed). Filters: status, company, recruiter_id,
        search.'
      summary: List jobs
      parameters:
      - in: query
        name: company
        schema:
          type: string
        description: Filter by company name
      - in: query
        name: ordering
        schema:
          type: string
        description: Order by field
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Page size (max 200)
      - in: query
        name: recruiter_id
        schema:
          type: string
        description: Filter by recruiter ID
      - in: query
        name: search
        schema:
          type: string
        description: Search by title or company
      - in: query
        name: status
        schema:
          type: string
        description: Filter by job status
      tags:
      - Admin
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Jobs retrieved successfully with pagination.
        '400':
          description: Invalid filter parameters.
        '403':
          description: Admin access required.
  /api/admin/jobs/{id}/:
    patch:
      operationId: admin_jobs_partial_update
      description: Update job status with moderation logging. Admin only.
      summary: Update job status
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema: {}
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Job status updated successfully.
        '400':
          description: Invalid input data.
        '404':
          description: Job not found.
        '403':
          description: Admin access required.
  /api/admin/resumes/:
    get:
      operationId: admin_resumes_retrieve
      description: 'List all resumes with filtering and pagination. Admin only. Filters:
        candidate_id, parsed, structured.'
      summary: List resumes
      parameters:
      - in: query
        name: candidate_id
        schema:
          type: string
        description: Filter by candidate ID
      - in: query
        name: ordering
        schema:
          type: string
        description: Order by field
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Page size (max 200)
      - in: query
        name: parsed
        schema:
          type: boolean
        description: Filter by parsed status
      - in: query
        name: structured
        schema:
          type: boolean
        description: Filter by structured data status
      tags:
      - Admin
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Resumes retrieved successfully with pagination.
        '400':
          description: Invalid filter parameters.
        '403':
          description: Admin access required.
  /api/admin/resumes/{id}/:
    patch:
      operationId: admin_resumes_partial_update
      description: Update resume (activate/deactivate user) with moderation logging.
        Admin only.
      summary: Update resume
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema: {}
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Resume updated successfully.
        '400':
          description: Invalid input data.
        '404':
          description: Resume not found.
        '403':
          description: Admin access required.
  /api/admin/users/:
    get:
      operationId: admin_users_retrieve
      description: 'List all users with filtering and pagination. Admin only. Filters:
        role, is_active, search. Ordering: email, full_name, date_joined, -date_joined.'
      summary: List users
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
        description: Filter by active status
      - in: query
        name: ordering
        schema:
          type: string
        description: Order by field
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Page size (max 200)
      - in: query
        name: role
        schema:
          type: string
        description: Filter by user role
      - in: query
        name: search
        schema:
          type: string
        description: Search by name or email
      tags:
      - Admin
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Users retrieved successfully with pagination.
        '400':
          description: Invalid filter parameters.
        '403':
          description: Admin access required.
  /api/admin/users/{id}/:
    get:
      operationId: admin_users_retrieve_2
      description: Retrieve a specific user. Admin only.
      summary: Get user details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Admin
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: User details retrieved successfully.
        '404':
          description: User not found.
        '403':
          description: Admin access required.
    patch:
      operationId: admin_users_partial_update
      description: Retrieve a specific user. Admin only.
      summary: Get user details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema: {}
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: User details retrieved successfully.
        '404':
          description: User not found.
        '403':
          description: Admin access required.
  /api/analytics/candidate/dashboard/:
    get:
      operationId: analytics_candidate_dashboard_retrieve
      description: Get candidate dashboard analytics with aggregated metrics for applications,
        interviews, and matches. Authentication required. Candidate only.
      summary: Candidate dashboard
      tags:
      - Analytics
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Dashboard analytics retrieved successfully.
        '403':
          description: Only candidates can access dashboard.
  /api/analytics/recruiter/dashboard/:
    get:
      operationId: analytics_recruiter_dashboard_retrieve
      description: Get recruiter dashboard analytics with aggregated metrics for jobs,
        applications, and interviews. Authentication required. Recruiter only.
      summary: Recruiter dashboard
      tags:
      - Analytics
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Dashboard analytics retrieved successfully.
        '403':
          description: Only recruiters can access dashboard.
  /api/analytics/recruiter/jobs/{job_id}/:
    get:
      operationId: analytics_recruiter_jobs_retrieve
      description: Get job-specific analytics for recruiters with application metrics
        and conversion rate. Authentication required. Recruiter owner only.
      summary: Job analytics
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Analytics
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Job analytics retrieved successfully.
        '403':
          description: Only recruiters can access job analytics.
        '404':
          description: Job not found.
  /api/analytics/recruiter/jobs/{job_id}/top-candidates/:
    get:
      operationId: analytics_recruiter_jobs_top_candidates_retrieve
      description: Get top matched candidates for a job (top 20 ordered by match score
        DESC). Authentication required. Recruiter owner only.
      summary: Top candidates
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Analytics
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Top candidates retrieved successfully.
        '403':
          description: Only recruiters can access top candidates.
        '404':
          description: Job not found.
  /api/applications/{application_id}/interviews/:
    get:
      operationId: applications_interviews_retrieve
      description: List interviews for a specific application. Candidates can view
        own application interviews. Recruiters can view interviews for their jobs.
      summary: List application interviews
      parameters:
      - in: path
        name: application_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Interviews
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Interviews retrieved successfully.
        '404':
          description: Application not found.
    post:
      operationId: applications_interviews_create
      description: List interviews for a specific application. Candidates can view
        own application interviews. Recruiters can view interviews for their jobs.
      summary: List application interviews
      parameters:
      - in: path
        name: application_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Interviews
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              ScheduleInterview:
                value:
                  scheduled_at: '2024-01-15T10:00:00Z'
                  interview_type: video
                  location: Zoom
                summary: Schedule interview
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Interviews retrieved successfully.
        '404':
          description: Application not found.
  /api/applications/{id}/:
    get:
      operationId: applications_retrieve
      description: Retrieve a specific application. Candidates can view own applications.
        Recruiters can view applications for their jobs.
      summary: Get application details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Applications
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Application details retrieved successfully.
        '404':
          description: Application not found.
  /api/applications/{id}/history/:
    get:
      operationId: applications_history_retrieve
      description: Retrieve application status history. Candidates can view own application
        history. Recruiters can view history for their jobs.
      summary: Get application history
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Applications
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Application history retrieved successfully.
        '404':
          description: Application not found.
  /api/applications/{id}/status/:
    patch:
      operationId: applications_status_partial_update
      description: Update application status. Recruiter only. Recruiter must own the
        job.
      summary: Update application status
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema: {}
            examples:
              UpdateApplicationStatus:
                value:
                  status: shortlisted
                summary: Update application status
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Application status updated successfully.
        '400':
          description: Invalid status transition.
        '403':
          description: Only recruiters can update application status.
        '404':
          description: Application not found.
  /api/applications/my/:
    get:
      operationId: applications_my_retrieve
      description: List all applications for the current candidate. Authentication
        required. Candidate only.
      summary: List my applications
      tags:
      - Applications
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Applications retrieved successfully.
        '403':
          description: Only candidates can view their applications.
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticate user with email and password. Returns JWT tokens in
        HTTP-only cookies.
      summary: User login
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required:
              - email
              - password
            examples:
              SuccessfulLogin:
                value:
                  email: candidate@example.com
                  password: securepassword123
                summary: Successful login
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
              examples:
                SuccessfulLogin:
                  value:
                    email: candidate@example.com
                    password: securepassword123
                  summary: Successful login
          description: Login successful. JWT tokens set in HTTP-only cookies.
        '401':
          description: Invalid credentials or inactive account
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Logout user by blacklisting refresh token and clearing HTTP-only
        cookies.
      summary: User logout
      tags:
      - Authentication
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      - {}
      responses:
        '200':
          description: Logout successful. Cookies cleared.
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Retrieve information about the currently authenticated user.
      summary: Get current user
      tags:
      - Users
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: User information retrieved successfully.
        '500':
          description: Profile not found
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: Refresh JWT access token using refresh token from HTTP-only cookie.
      summary: Refresh access token
      tags:
      - Authentication
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      - {}
      responses:
        '200':
          description: Token refreshed successfully. New access token set in cookie.
        '401':
          description: Refresh token missing or invalid
  /api/auth/register/candidate/:
    post:
      operationId: auth_register_candidate_create
      description: Register a new candidate account. Creates user and candidate profile.
        Returns JWT tokens in HTTP-only cookies.
      summary: Candidate registration
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                full_name:
                  type: string
              required:
              - email
              - password
              - full_name
            examples:
              CandidateRegistration:
                value:
                  email: candidate@example.com
                  password: securepassword123
                  full_name: John Doe
                summary: Candidate registration
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      - {}
      responses:
        '201':
          description: Registration successful. JWT tokens set in HTTP-only cookies.
        '400':
          description: Invalid input data
  /api/auth/register/recruiter/:
    post:
      operationId: auth_register_recruiter_create
      description: Register a new recruiter account. Creates user and recruiter profile.
        Returns JWT tokens in HTTP-only cookies.
      summary: Recruiter registration
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                full_name:
                  type: string
                company_name:
                  type: string
              required:
              - email
              - password
              - full_name
              - company_name
            examples:
              RecruiterRegistration:
                value:
                  email: recruiter@company.com
                  password: securepassword123
                  full_name: Jane Smith
                  company_name: Tech Corp
                summary: Recruiter registration
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      - {}
      responses:
        '201':
          description: Registration successful. JWT tokens set in HTTP-only cookies.
        '400':
          description: Invalid input data
  /api/health/:
    get:
      operationId: health_retrieve
      description: Check system health and dependency status.
      summary: Health check
      tags:
      - System
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      - {}
      responses:
        '200':
          description: Health status retrieved successfully.
  /api/interviews/{interview_id}/:
    get:
      operationId: interviews_retrieve
      description: Retrieve a specific interview. Candidates can view own interviews.
        Recruiters can view interviews for their jobs.
      summary: Get interview details
      parameters:
      - in: path
        name: interview_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Interviews
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Interview details retrieved successfully.
        '404':
          description: Interview not found.
  /api/interviews/{interview_id}/history/:
    get:
      operationId: interviews_history_retrieve
      description: Retrieve interview status history. Candidates can view own interview
        history. Recruiters can view history for their jobs.
      summary: Get interview history
      parameters:
      - in: path
        name: interview_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Interviews
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Interview history retrieved successfully.
        '404':
          description: Interview not found.
  /api/interviews/{interview_id}/status/:
    patch:
      operationId: interviews_status_partial_update
      description: Update interview status. Recruiter only. Recruiter must own the
        job.
      summary: Update interview status
      parameters:
      - in: path
        name: interview_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Interviews
      requestBody:
        content:
          application/json:
            schema: {}
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Interview status updated successfully.
        '400':
          description: Invalid status transition.
        '403':
          description: Only recruiters can update interview status.
        '404':
          description: Interview not found.
  /api/jobs/:
    get:
      operationId: jobs_retrieve
      description: List active jobs with search, filtering, and pagination. Returns
        only ACTIVE jobs.
      summary: List active jobs
      parameters:
      - in: query
        name: employment_type
        schema:
          type: string
        description: Filter by employment type (full_time, part_time, contract, internship)
      - in: query
        name: experience_level
        schema:
          type: string
        description: Filter by experience level (entry, junior, mid, senior, lead)
      - in: query
        name: is_remote
        schema:
          type: boolean
        description: Filter by remote status (true/false)
      - in: query
        name: location
        schema:
          type: string
        description: Filter by location
      - in: query
        name: ordering
        schema:
          type: string
        description: Order by field (created_at, -created_at, salary_min, -salary_min,
          salary_max, -salary_max)
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Page size (max 100)
      - in: query
        name: q
        schema:
          type: string
        description: Search query (title, company, description)
      - in: query
        name: salary_max
        schema:
          type: number
          format: double
        description: Filter by maximum salary
      - in: query
        name: salary_min
        schema:
          type: number
          format: double
        description: Filter by minimum salary
      tags:
      - Jobs
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Jobs retrieved successfully with pagination.
        '400':
          description: Invalid filter parameters.
  /api/jobs/{id}/:
    get:
      operationId: jobs_retrieve_2
      description: Retrieve a specific job. Candidates can view ACTIVE jobs only.
        Recruiter owners can view own jobs (any status).
      summary: Get job details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Jobs
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Job details retrieved successfully.
        '404':
          description: Job not found.
    patch:
      operationId: jobs_partial_update
      description: Retrieve a specific job. Candidates can view ACTIVE jobs only.
        Recruiter owners can view own jobs (any status).
      summary: Get job details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema: {}
      security:
      - CookieJWTAuthentication: []
      - type: http
        scheme: bearer
        bearerFormat: JWT
      responses:
        '200':
          description: Job details retrieved successfully.
        '404':
          description: Job not found.
  /api/jobs/{id}/close/:
    post:
      operationId: jobs_close_create
      description: Close a job posting. Recruiter owner only.
      summary: Close a job
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
