services:
  db:
    image: postgres:15-alpine
    env_file:
      - ${ENV_FILE:-.env.development}
    environment:
      POSTGRES_DB: ${DB_NAME:-matchhire}
      POSTGRES_USER: ${DB_USER:-matchhire}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-matchhire}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - ${ENV_FILE:-.env.development}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ${ENV_FILE:-.env.development}
    volumes:
      - ./backend:/app/backend
      - ./docker:/app/docker
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ${ENV_FILE:-.env.development}
    volumes:
      - ./backend:/app/backend
      - ./docker:/app/docker
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A matchhire_backend worker -l info
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ${ENV_FILE:-.env.development}
    volumes:
      - ./backend:/app/backend
      - ./docker:/app/docker
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A matchhire_backend beat -l info
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    env_file:
      - ${ENV_FILE:-.env.development}
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_started
    volumes:
      - static_volume:/staticfiles:ro
      - media_volume:/media:ro
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:

